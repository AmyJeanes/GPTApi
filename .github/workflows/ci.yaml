name: CI
on:
  push:
    branches:
    - main
    - renovate/*
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      skipBuild:
        description: 'Skip Build (deploy only)'
        required: true
        default: 'false'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
    
    - name: Build Docker image
      run: docker build -t ghcr.io/amyjeanes/gptapi:latest .
      if: github.event.inputs.skipBuild != 'true'

    - name: Push Docker images
      run: |
        echo $GITHUB_TOKEN | docker login ghcr.io --username amyjeanes --password-stdin
        docker push ghcr.io/amyjeanes/gptapi:latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: github.ref == 'refs/heads/main' && github.event.inputs.skipBuild != 'true'
  deploy:
    if: github.ref == 'refs/heads/main'
    name: Deploy
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

    - name: Checkout Abyss-Infrastructure
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        repository: AmyJeanes/Abyss-Infrastructure
        path: infrastructure

    - name: Connect to Kubernetes
      uses: AmyJeanes/Abyss-Infrastructure/.github/actions/connect-k8s@fc783b4947f460763fbb5ec0e1aeb22b0038d6f7 # main
      with:
        kubeconfig: "${{ secrets.KUBECONFIG }}"
        hostname: "${{ vars.KUBERNETES_API_HOSTNAME }}"
        serviceTokenId: ${{ vars.CLOUDFLARE_TUNNEL_SERVICE_TOKEN_ID }}
        serviceTokenSecret: ${{ secrets.CLOUDFLARE_TUNNEL_SERVICE_TOKEN_SECRET }}

    - name: Install persistent volume for gptapi-models
      run: |
        helm upgrade --install --wait --atomic --debug \
          gptapi-models-persistentvolume . \
          --namespace default \
          --set name=gptapi-models \
          --set disk.capacity=10Gi
      working-directory: infrastructure/kubernetes/charts/local-persistentvolume

    - name: Install GPT Api
      run: |
        helm upgrade --install --wait --atomic --debug --timeout 10m0s \
          gptapi ./gptapi \
          --namespace default \
          --set ingress.host="${{ vars.HOST }}" \
          --set ingress.whitelist="${{ secrets.IP_WHITELIST }}"
      working-directory: charts
        
    - name: Wait for certificate to be ready
      uses: AmyJeanes/Abyss-Infrastructure/.github/actions/wait-kube-certificate@fc783b4947f460763fbb5ec0e1aeb22b0038d6f7 # main
      with:
        name: "gptapi-tls"

    - name: Disconnect from Kubernetes
      if: always()
      uses: AmyJeanes/Abyss-Infrastructure/.github/actions/disconnect-k8s@fc783b4947f460763fbb5ec0e1aeb22b0038d6f7 # main
